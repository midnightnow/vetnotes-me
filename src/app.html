<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
        // Pre-paint theme hint: avoids a light flash for Night Shift users.
        try { if (localStorage.getItem("vetnotes_theme") === "nightshift") document.documentElement.dataset.theme = "nightshift"; } catch (e) {}
    </script>
    %sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
</body>

</html>
