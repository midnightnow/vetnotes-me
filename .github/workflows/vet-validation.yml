name: Vet Validation

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    name: Document Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run document validation
        run: npm run check
        continue-on-error: false

      - name: Run vitest (fallback)
        if: failure()
        run: npx vitest run
        continue-on-error: false
